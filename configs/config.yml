# nemo_code_agent — main runtime configuration
# Follows the NeMo Agent Toolkit (NAT) YAML schema.
# All ${VAR} references are resolved from the environment (or .env).

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: WARNING   # Keep the NAT console quiet; our Rich UI handles UX.

# ---------------------------------------------------------------------------
# LLM Definitions
# Two named LLMs using the "nim" type, which accepts any OpenAI-compatible
# base_url — so vLLM's /v1 endpoint works without a separate adapter.
# ---------------------------------------------------------------------------
llms:
  planner_llm:
    _type: nim
    model_name: ${PLANNER_MODEL}          # e.g. nvidia/llama-3.1-nemotron-70b-instruct
    base_url: ${PLANNER_URL}              # e.g. https://integrate.api.nvidia.com/v1
    api_key: ${PLANNER_API_KEY}
    temperature: 0.2
    top_p: 0.9
    max_tokens: 8192
    num_retries: 3

  coder_llm:
    _type: nim
    model_name: ${CODER_MODEL}            # e.g. deepseek-coder-v2-instruct
    base_url: ${CODER_URL}               # e.g. http://localhost:8000/v1
    api_key: ${CODER_API_KEY:-none}      # vLLM typically accepts any non-empty key
    temperature: 0.1
    top_p: 0.95
    max_tokens: 16384
    num_retries: 2

# ---------------------------------------------------------------------------
# Top-level Workflow — langgraph_wrapper
# ---------------------------------------------------------------------------
# Wraps our compiled LangGraph agent directly so NAT can serve or evaluate
# it without any code changes.  LLM config is read from .env at import time.
#
# Use with:
#   nat run   --config_file configs/config.yml --input "your question"
#   nat serve --config_file configs/config.yml
#   nat eval  --config_file configs/config.yml --dataset data.jsonl
#
# For the interactive REPL, use ./run.sh (code-agent run) instead.
# ---------------------------------------------------------------------------
workflow:
  _type: langgraph_wrapper
  graph: src/nemo_code_agent/nat_graph.py:graph
  env: .env
